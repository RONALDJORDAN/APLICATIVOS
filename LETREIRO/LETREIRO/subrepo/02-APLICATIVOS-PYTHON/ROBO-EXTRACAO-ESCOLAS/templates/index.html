<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Escolas — Codaureo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30, 30, 55, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00b894;
            --success-glow: rgba(0, 184, 148, 0.15);
            --danger: #e17055;
            --danger-hover: #d63031;
            --warn: #fdcb6e;
            --text-primary: #eaeaff;
            --text-secondary: #8888aa;
            --text-muted: #55557a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: #e17055;
            bottom: -100px;
            right: -100px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), var(--accent), #e17055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            margin-top: 6px;
            font-size: 0.9rem;
        }

        /* ─── Glass Card ─── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            transition: box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .card h2 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── Textarea ─── */
        textarea {
            width: 100%;
            min-height: 220px;
            background: rgba(15, 15, 30, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            padding: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* ─── Buttons ─── */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #5a4bd1);
            color: #fff;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            color: var(--accent-light);
            border: 1px solid var(--accent);
        }

        .btn-outline:hover {
            background: rgba(108, 92, 231, 0.15);
        }

        .btn-danger-sm {
            padding: 4px 10px;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger-sm:hover {
            background: var(--danger);
            color: #fff;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger-hover);
        }

        /* ─── Preview Grid ─── */
        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stats-bar .stat {
            padding: 5px 14px;
            border-radius: 20px;
            background: var(--success-glow);
            color: var(--success);
        }

        .stats-bar .stat.warn {
            background: rgba(253, 203, 110, 0.15);
            color: var(--warn);
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .preview-item {
            background: rgba(15, 15, 30, 0.5);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .preview-item label {
            display: block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .preview-item span {
            font-size: 0.82rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .preview-item span.empty {
            color: var(--danger);
            font-style: italic;
            font-size: 0.75rem;
        }

        /* ─── Data Table ─── */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }

        thead th {
            background: rgba(108, 92, 231, 0.12);
            color: var(--accent-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-size: 0.65rem;
            padding: 10px 8px;
            text-align: left;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
        }

        tbody td {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(108, 92, 231, 0.06);
        }

        .null-val {
            color: var(--text-muted);
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 35px;
            color: var(--text-muted);
        }

        .empty-state span {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 8px;
        }

        .badge {
            background: var(--accent);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            margin-left: 6px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .card {
                padding: 16px;
            }

            .preview-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📋 Extrator de Escolas — i-Educar</h1>
            <p>Cole o texto bruto da ficha da escola e extraia os dados estruturados automaticamente.</p>
        </div>

        <!-- INPUT -->
        <div class="card">
            <h2>📝 Texto Bruto (cole aqui)</h2>
            <textarea id="texto-bruto"
                placeholder="Cole aqui o texto copiado da ficha da escola no i-Educar...&#10;&#10;O sistema identifica automaticamente campos como:&#10;Escola*, CNPJ:, Endereço, Telefone, Email, Diretor(a), etc."></textarea>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-extrair" onclick="extrairDados()">🔍 Extrair e Salvar</button>
                <button class="btn btn-outline" onclick="limparTexto()">🗑️ Limpar</button>
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="card" id="preview-card" style="display:none;">
            <h2>🔎 Última Extração</h2>
            <div class="stats-bar" id="stats-bar"></div>
            <div class="preview-grid" id="preview-grid"></div>
        </div>

        <!-- TABLE -->
        <div class="card">
            <h2>📊 Registros Salvos <span class="badge" id="counter-badge">0</span></h2>
            <div class="btn-row" style="margin-top: 0; margin-bottom: 8px;">
                <button class="btn btn-outline" onclick="exportarExcel()">📥 Exportar Excel</button>
            </div>
            <div class="table-wrapper" id="table-container">
                <div class="empty-state"><span>📭</span>Nenhum registro.</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CAMPOS = [
            { key: 'codigo_inep', label: 'Cód. INEP' },
            { key: 'cnpj', label: 'CNPJ' },
            { key: 'nome_escola', label: 'Escola' },
            { key: 'sigla', label: 'Sigla' },
            { key: 'instituicao', label: 'Instituição' },
            { key: 'rede_ensino', label: 'Rede' },
            { key: 'zona_localizacao', label: 'Zona' },
            { key: 'localizacao_diferenciada', label: 'Loc. Diferenciada' },
            { key: 'cep', label: 'CEP' },
            { key: 'endereco', label: 'Endereço' },
            { key: 'numero', label: 'Número' },
            { key: 'complemento', label: 'Complemento' },
            { key: 'bairro', label: 'Bairro' },
            { key: 'municipio', label: 'Município' },
            { key: 'distrito', label: 'Distrito' },
            { key: 'telefone1', label: 'Telefone 1' },
            { key: 'telefone2', label: 'Telefone 2' },
            { key: 'celular', label: 'Celular' },
            { key: 'email', label: 'Email' },
            { key: 'site', label: 'Site' },
            { key: 'situacao_funcionamento', label: 'Situação' },
            { key: 'dependencia_adm', label: 'Dep. Adm.' },
            { key: 'regulamentacao', label: 'Regulamentação' },
            { key: 'ato_criacao', label: 'Ato Criação' },
            { key: 'ato_autorizativo', label: 'Ato Autorizativo' },
            { key: 'secretario_escolar', label: 'Secretário' },
            { key: 'diretor', label: 'Diretor(a)' }
        ];

        // Campos principais para a tabela compacta
        const TABLE_COLS = [
            'nome_escola', 'cnpj', 'codigo_inep', 'municipio',
            'telefone1', 'email', 'diretor', 'situacao_funcionamento'
        ];

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        async function extrairDados() {
            const texto = document.getElementById('texto-bruto').value.trim();
            if (!texto) { showToast('Cole um texto primeiro!', 'error'); return; }

            const btn = document.getElementById('btn-extrair');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Processando...';

            try {
                const res = await fetch('/extrair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.mensagem || `${data.campos_encontrados}/${data.total_campos} campos extraídos!`);
                    mostrarPreview(data.dados, data.campos_encontrados, data.total_campos);
                    carregarDados();
                } else {
                    showToast(data.erro || 'Erro.', 'error');
                }
            } catch (e) {
                showToast('Erro de conexão com o servidor.', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '🔍 Extrair e Salvar';
        }

        function mostrarPreview(dados, found, total) {
            document.getElementById('preview-card').style.display = 'block';
            const stats = document.getElementById('stats-bar');
            const pct = Math.round((found / total) * 100);
            stats.innerHTML = `
                <div class="stat">${found} campos encontrados</div>
                <div class="stat ${pct < 50 ? 'warn' : ''}">${pct}% de cobertura</div>
            `;

            const grid = document.getElementById('preview-grid');
            grid.innerHTML = CAMPOS.map(c => {
                const val = dados[c.key];
                return `<div class="preview-item">
                    <label>${escapeHtml(c.label)}</label>
                    <span class="${val ? '' : 'empty'}">${val ? escapeHtml(val) : '—'}</span>
                </div>`;
            }).join('');
        }

        async function carregarDados() {
            try {
                const res = await fetch('/dados');
                const dados = await res.json();
                const container = document.getElementById('table-container');
                document.getElementById('counter-badge').textContent = dados.length;

                if (!dados.length) {
                    container.innerHTML = '<div class="empty-state"><span>📭</span>Nenhum registro.</div>';
                    return;
                }

                const colLabels = TABLE_COLS.map(k => CAMPOS.find(c => c.key === k)?.label || k);
                const headerRow = colLabels.map(l => `<th>${escapeHtml(l)}</th>`).join('') + '<th>Data</th><th></th>';

                const rows = dados.map(d => {
                    const cells = TABLE_COLS.map(k => {
                        const v = d[k];
                        return `<td title="${escapeHtml(v)}">${v ? escapeHtml(v) : '<span class="null-val">—</span>'}</td>`;
                    }).join('');
                    return `<tr>${cells}<td>${escapeHtml(d.data_extracao)}</td><td><button class="btn-danger-sm" onclick="deletar(${d.id})">✕</button></td></tr>`;
                }).join('');

                container.innerHTML = `<table><thead><tr>${headerRow}</tr></thead><tbody>${rows}</tbody></table>`;
            } catch (e) { console.error(e); }
        }

        async function deletar(id) {
            if (!confirm(`Remover registro #${id}?`)) return;
            await fetch(`/dados/${id}`, { method: 'DELETE' });
            showToast('Removido.');
            carregarDados();
        }

        function exportarExcel() { window.location.href = '/exportar'; }
        function limparTexto() {
            document.getElementById('texto-bruto').value = '';
            document.getElementById('preview-card').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>

</html>
