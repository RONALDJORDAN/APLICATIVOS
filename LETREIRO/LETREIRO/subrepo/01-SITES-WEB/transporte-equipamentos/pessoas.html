<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoas | InnovPlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .person-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .person-card:hover {
            border-color: rgba(232, 67, 147, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .person-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .person-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            color: white;
            flex-shrink: 0;
        }

        .person-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
            margin: 0;
            line-height: 1.2;
        }

        .person-role {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .person-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-row ion-icon {
            color: var(--accent-purple);
        }

        .person-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-box .count {
            display: block;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-box .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .delete-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
            font-size: 1.2rem;
        }

        .delete-btn:hover {
            color: var(--red);
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <ion-icon name="play-outline"></ion-icon>
                <span>InnovPlay</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><ion-icon name="grid-outline"></ion-icon> Dashboard</a></li>
                    <li class="active"><a href="pessoas.html"><ion-icon name="people-outline"></ion-icon> Pessoas</a>
                    </li>
                    <li><a href="equipamentos.html"><ion-icon name="list-outline"></ion-icon> Equipamentos</a></li>
                    <li><a href="aplicacao.html"><ion-icon name="school-outline"></ion-icon> Aplicação</a></li>
                    <li><a href="mapa.html"><ion-icon name="map-outline"></ion-icon> Mapa de Rotas</a></li>
                    <li><a href="configuracoes.html"><ion-icon name="settings-outline"></ion-icon> Configurações</a>
                    </li>
                </ul>
            </nav>
            <div class="user-profile">
                <div class="avatar"></div>
                <div class="user-info">
                    <p class="name">Admin User</p>
                    <p class="role">Controlador</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="hidden">
                <div class="spinner"></div>
                <p>Processando dados...</p>
            </div>

            <header class="anim-fade-up">
                <div class="greeting">
                    <h1>Gestão de <span>Pessoas</span></h1>
                    <p>Controle de responsáveis, motoristas e vínculos.</p>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" onclick="openModalPessoa()">
                        <ion-icon name="person-add-outline"></ion-icon> Nova Pessoa
                    </button>
                </div>
            </header>

            <!-- Cards Grid -->
            <section id="pessoas-grid" class="cards-grid anim-fade-up anim-delay-2">
                <!-- Dynamic content via JS -->
            </section>

            <!-- Modal for Nova Pessoa -->
            <div class="modal-overlay" id="modal-pessoa">
                <div class="modal-card">
                    <div class="modal-header">
                        <h3><ion-icon name="person-add-outline"></ion-icon> Cadastrar Pessoa</h3>
                        <button class="modal-close" onclick="closeModalPessoa()">
                            <ion-icon name="close-outline"></ion-icon>
                        </button>
                    </div>
                    <form id="form-cadastro-pessoa">
                        <div class="form-group">
                            <label>Nome Completo *</label>
                            <input type="text" id="p-nome" class="form-control" required
                                placeholder="Ex: João Silva Santos">
                        </div>
                        <div class="form-group">
                            <label>CPF</label>
                            <input type="text" id="p-cpf" class="form-control" placeholder="000.000.000-00">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Data de Nascimento</label>
                                <input type="date" id="p-nascimento" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Habilitação (CNH)</label>
                                <input type="text" id="p-cnh" class="form-control"
                                    placeholder="Número da CNH (Opcional)">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary"
                            style="width: 100%; justify-content: center; margin-top: 1rem;">
                            <ion-icon name="checkmark-outline"></ion-icon> Salvar Pessoa
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
