<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | TransEquip</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <ion-icon name="play-outline"></ion-icon>
                <span>InnovPlay</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><ion-icon name="grid-outline"></ion-icon> Dashboard</a></li>
                    <li><a href="pessoas.html"><ion-icon name="people-outline"></ion-icon> Pessoas</a></li>
                    <li><a href="equipamentos.html"><ion-icon name="list-outline"></ion-icon> Equipamentos</a></li>
                    <li><a href="aplicacao.html"><ion-icon name="school-outline"></ion-icon> Aplicação</a></li>
                    <li><a href="mapa.html"><ion-icon name="map-outline"></ion-icon> Mapa de Rotas</a></li>
                    <li class="active"><a href="configuracoes.html"><ion-icon name="settings-outline"></ion-icon>
                            Configurações</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <div class="avatar"></div>
                <div class="user-info">
                    <p class="name">Admin User</p>
                    <p class="role">Controlador</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="anim-fade-up">
                <div class="greeting">
                    <h1>Relatórios e <span>Estatísticas</span></h1>
                    <p>Analise o desempenho dos transportes.</p>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="chart-container large anim-fade-up anim-delay-2">
                    <div class="chart-header">
                        <h3>Eficiência de Entrega</h3>
                        <p>Porcentagem de Entregues com sucesso</p>
                    </div>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="efficiencyChart"></canvas>
                    </div>
                </div>
                <div class="chart-container small anim-fade-up anim-delay-3">
                    <div class="chart-header">
                        <h3>Status Geral</h3>
                    </div>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>

</html>
