<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="app-icon"
                style="background: linear-gradient(135deg, #3B82F6, #2563EB); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);">
                <i class="fa-solid fa-qrcode"></i>
            </div>
            <h1 class="title">Acesse o Sistema</h1>
            <p class="description">Escaneie o QR Code abaixo com a câmera do seu celular para ser redirecionado
                automaticamente.</p>

            <div class="download-section" style="padding-top: 10px;">
                <div id="qrcode-container"
                    style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); display: inline-block;">
                </div>

                <p style="margin-top: 20px; font-size: 14px; color: var(--text-muted);">
                    Ou acesse o link:<br>
                    <a href="https://rastrearinnov.netlify.app/" target="_blank"
                        style="color: var(--secondary); text-decoration: none; font-weight: 600; display: inline-block; margin-top: 5px;">https://rastrearinnov.netlify.app/</a>
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Renderiza o QR Code apontando para o link fornecido
            new QRCode(document.getElementById("qrcode-container"), {
                text: "https://rastrearinnov.netlify.app/",
                width: 180,
                height: 180,
                colorDark: "#0F172A",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        });
    </script>
</body>

</html>
