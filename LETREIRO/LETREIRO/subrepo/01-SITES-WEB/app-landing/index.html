<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixar Fully Kiosk Browser</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="app-icon"
                style="background: linear-gradient(135deg, #FF6B6B, #C0392B); box-shadow: 0 10px 25px -5px rgba(255, 107, 107, 0.5);">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h1 class="title">Fully Kiosk Browser</h1>
            <p class="description">Baixe o Fully Kiosk Browser & Lockdown diretamente no seu dispositivo Android para
                uma experiência imersiva e segura.</p>

            <div id="download-section" class="download-section">
                <!-- Content will be injected by JS based on device -->
                <div class="loadingSpinner"></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
