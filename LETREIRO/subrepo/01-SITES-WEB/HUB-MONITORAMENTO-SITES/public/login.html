<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureo Hub | Acesso Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #5e6ad2;
            --primary-light: #7c88e8;
            --success: #00ff95;
            --danger: #ff4d6d;
            --warning: #ffca28;
            --bg: #06070d;
            --surface: #0d0f1a;
            --border: rgba(255,255,255,0.07);
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND PARTICLES / ORBS */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: floatOrb 8s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(94,106,210,0.12); top: -100px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: rgba(0,255,149,0.06); bottom: -100px; right: -100px; animation-delay: -3s; }
        .orb-3 { width: 300px; height: 300px; background: rgba(124,136,232,0.08); top: 40%; left: 50%; animation-delay: -5s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* GRID LINES */
        .grid-bg {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(94,106,210,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(94,106,210,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* LOGIN CARD */
        .login-card {
            position: relative; z-index: 10;
            background: rgba(13,15,26,0.85);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            margin: 1rem;
            animation: cardEntrance 0.8s cubic-bezier(0.23,1,0.32,1) both;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(94,106,210,0.1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* LOGO AREA */
        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            margin-bottom: 1.2rem;
            box-shadow: 0 10px 30px rgba(94,106,210,0.4);
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); box-shadow: 0 10px 30px rgba(94,106,210,0.4); }
            50% { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(94,106,210,0.5); }
        }
        .logo-title {
            font-size: 1.6rem; font-weight: 900; color: #fff;
            letter-spacing: -1px;
        }
        .logo-title span { color: var(--primary-light); }
        .logo-subtitle {
            font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;
        }



        /* FORM */
        .form-group { margin-bottom: 1.2rem; }
        .form-label {
            display: block; font-size: 0.75rem; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px;
        }
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.9rem; pointer-events: none;
        }
        .form-input {
            width: 100%; background: rgba(0,0,0,0.35); border: 1px solid var(--border);
            border-radius: 12px; padding: 13px 14px 13px 42px;
            color: #fff; font-size: 0.9rem; outline: none;
            font-family: inherit; transition: all 0.25s;
        }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(94,106,210,0.15); }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }

        /* PASSWORD TOGGLE */
        .toggle-pwd {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .toggle-pwd:hover { color: #fff; }

        /* BUTTONS */
        .btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none; border-radius: 14px; color: #fff;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            transition: all 0.3s; font-family: inherit; margin-top: 0.5rem;
            position: relative; overflow: hidden;
        }
        .btn-primary::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
            opacity: 0; transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(94,106,210,0.5); }
        .btn-primary:hover::after { opacity: 1; }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-google {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 14px; color: #fff; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            font-family: inherit; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-top: 0.8rem;
        }
        .btn-google:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
        .google-logo { width: 18px; height: 18px; }

        /* DIVIDER */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 1.5rem 0; color: var(--text-muted); font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* ERROR / SUCCESS ALERTS */
        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: 0.82rem;
            font-weight: 500; margin-bottom: 1.2rem; display: none;
            animation: slideDown 0.3s ease;
        }
        .alert.error { background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.25); color: #ff8fa3; }
        .alert.success { background: rgba(0,255,149,0.08); border: 1px solid rgba(0,255,149,0.2); color: #00ff95; }
        .alert.show { display: flex; align-items: center; gap: 10px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        /* LOADING SPINNER */
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SECURITY BADGE */
        .security-footer {
            margin-top: 2rem; text-align: center;
            font-size: 0.72rem; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .security-footer i { color: var(--success); }

        /* FORGOT PASSWORD LINK */
        .forgot-link {
            font-size: 0.78rem; color: var(--primary-light); text-decoration: none;
            float: right; margin-bottom: 8px; transition: 0.2s;
        }
        .forgot-link:hover { color: #fff; }

        /* ─── RESPONSIVE: iPhone 14 Pro Max ─── */
        @media (max-width: 430px) {
            .login-card {
                padding: 2rem 1.4rem;
                border-radius: 20px;
                margin: 0;
                min-height: 100dvh;
                border-radius: 0;
                justify-content: center;
                display: flex;
                flex-direction: column;
            }
            /* Logo icon -30%: era 72px → 50px */
            .logo-icon {
                width: 50px; height: 50px;
                font-size: 1.25rem;
                border-radius: 14px;
            }
            .logo-title  { font-size: 1.25rem; }
            .logo-subtitle { font-size: 0.78rem; }
            .logo-area { margin-bottom: 1.8rem; }

            .form-input { padding: 12px 12px 12px 38px; font-size: 0.85rem; }
            .input-icon { font-size: 0.78rem; } /* -30% */
            .btn-primary { padding: 13px; font-size: 0.92rem; }
            .btn-google  { padding: 11px; font-size: 0.82rem; }
            .btn-google .google-logo { width: 15px; height: 15px; } /* -30% */

            .alert { font-size: 0.78rem; padding: 10px 12px; }
            .security-footer { font-size: 0.68rem; margin-top: 1.4rem; }
            .security-footer i { font-size: 0.75rem; } /* -30% */
            .divider { font-size: 0.7rem; margin: 1.2rem 0; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND -->
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- CARD DE LOGIN -->
    <div class="login-card">

        <!-- LOGO -->
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-satellite-dish"></i></div>
            <div class="logo-title">AUREO <span>HUB</span></div>
            <div class="logo-subtitle">Central de Monitoramento & DevOps Pessoal</div>
        </div>



        <!-- ALERTAS -->
        <div class="alert error" id="authError">
            <i class="fas fa-triangle-exclamation"></i>
            <span id="authErrorMsg">Erro desconhecido</span>
        </div>
        <div class="alert success" id="authSuccess">
            <i class="fas fa-check-circle"></i>
            <span id="authSuccessMsg">Sucesso!</span>
        </div>

        <!-- FORMULÁRIO DE LOGIN -->
        <form id="formLogin" onsubmit="doLogin(event)">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Senha <a href="#" class="forgot-link" onclick="doForgotPassword(event)">Esqueceu?</a></label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pwd" onclick="togglePwd('loginPassword', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="btnLogin">
                <i class="fas fa-arrow-right-to-bracket"></i> Acessar o Hub
            </button>
        </form>



        <!-- DIVIDER + GOOGLE -->
        <div class="divider">ou continue com</div>
        <button class="btn-google" onclick="doGoogleLogin()">
            <svg class="google-logo" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Entrar com Google
        </button>

        <div class="security-footer">
            <i class="fas fa-shield-halved"></i>
            Conexão protegida · Firebase Auth · TLS 1.3
        </div>
    </div>

    <!-- FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        // ─── FIREBASE CONFIG ─────────────────────────────────
        firebase.initializeApp({
            apiKey: "AIzaSyDklNxvjx2i9PDuBI5AhuqpSGbedrlXlYs",
            authDomain: "teste-f2dfb.firebaseapp.com",
            projectId: "teste-f2dfb",
            storageBucket: "teste-f2dfb.firebasestorage.app",
            messagingSenderId: "824690991990",
            appId: "1:824690991990:web:355c25a2c7bbe7a8985057",
            measurementId: "G-GQ6QND2PXZ"
        });
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // Se já estiver logado, redireciona direto
        auth.onAuthStateChanged(user => {
            if (user) window.location.replace('index.html');
        });

        // ─── HELPERS UI ───────────────────────────────────────
        function showError(msg) {
            document.getElementById('authError').classList.add('show');
            document.getElementById('authErrorMsg').textContent = msg;
            document.getElementById('authSuccess').classList.remove('show');
        }
        function showSuccess(msg) {
            document.getElementById('authSuccess').classList.add('show');
            document.getElementById('authSuccessMsg').textContent = msg;
            document.getElementById('authError').classList.remove('show');
        }
        function clearAlerts() {
            document.getElementById('authError').classList.remove('show');
            document.getElementById('authSuccess').classList.remove('show');
        }
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = `<span class="spinner"></span> Aguarde...`;
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'btnLogin'
                    ? '<i class="fas fa-arrow-right-to-bracket"></i> Acessar o Hub'
                    : '<i class="fas fa-user-plus"></i> Criar Minha Conta';
            }
        }

        function togglePwd(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.querySelector('i').className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
        }
        function friendlyError(code) {
            const map = {
                'auth/invalid-email': 'E-mail inválido.',
                'auth/user-not-found': 'Usuário não encontrado.',
                'auth/wrong-password': 'Senha incorreta. Tente novamente.',
                'auth/invalid-credential': 'E-mail ou senha inválidos.',
                'auth/email-already-in-use': 'Este e-mail já está em uso.',
                'auth/weak-password': 'Senha muito fraca. Use ao menos 6 caracteres.',
                'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde.',
                'auth/popup-closed-by-user': 'Login com Google cancelado.',
            };
            return map[code] || 'Erro inesperado. Tente novamente.';
        }

        // ─── AÇÕES ────────────────────────────────────────────
        async function doLogin(e) {
            e.preventDefault(); clearAlerts();
            const email = document.getElementById('loginEmail').value;
            const pass  = document.getElementById('loginPassword').value;
            setLoading('btnLogin', true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showSuccess('Login realizado! Redirecionando...');
                setTimeout(() => window.location.replace('index.html'), 1000);
            } catch(err) {
                showError(friendlyError(err.code));
                setLoading('btnLogin', false);
            }
        }

        async function doGoogleLogin() {
            clearAlerts();
            try {
                await auth.signInWithPopup(googleProvider);
                showSuccess('Login com Google realizado! Redirecionando...');
                setTimeout(() => window.location.replace('index.html'), 800);
            } catch(err) {
                showError(friendlyError(err.code));
            }
        }
        async function doForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            if (!email) { showError('Digite seu e-mail acima primeiro.'); return; }
            try {
                await auth.sendPasswordResetEmail(email);
                showSuccess('E-mail de recuperação enviado! Verifique sua caixa de entrada.');
            } catch(err) {
                showError(friendlyError(err.code));
            }
        }
    </script>
</body>
</html>
